<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Протокол совещания</title>
  <script type="module" crossorigin src="/assets/index-CF7I7uM_.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-Cc3X966b.css">
</head>
<body>

<header>
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
      <path d="M2 4C2 2.9 2.9 2 4 2H14L18 6V24C18 25.1 17.1 26 16 26H4C2.9 26 2 25.1 2 24V4Z" fill="#3b82f6"/>
      <path d="M14 2L18 6H15C14.4 6 14 5.6 14 5V2Z" fill="#1d4ed8"/>
      <rect x="5" y="10" width="9"   height="1.5" rx=".75" fill="white" fill-opacity=".85"/>
      <rect x="5" y="13" width="7.5" height="1.5" rx=".75" fill="white" fill-opacity=".85"/>
      <rect x="5" y="16" width="6"   height="1.5" rx=".75" fill="white" fill-opacity=".85"/>
      <circle cx="21" cy="21" r="7" fill="#0f172a"/>
      <circle cx="21" cy="21" r="6" fill="#059669"/>
      <path d="M18 21l2.2 2.5 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="logo-text"><span>Meeting</span><span>Minutes</span></div>
  </div>
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="protocol">Протокол</button>
    <button class="tab-btn" data-tab="refs">Справочники</button>
  </nav>
  <div class="search-wrap">
    <span class="search-icon">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="5.5" cy="5.5" r="4" stroke="#8b9ab8" stroke-width="1.5"/>
        <path d="M9 9l3 3" stroke="#8b9ab8" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </span>
    <input type="text" id="searchInput" placeholder="Поиск…">
  </div>
  <button class="theme-toggle" id="themeToggle" title="Переключить тему" aria-label="Переключить тему">
    <span class="theme-icon">🌙</span>
  </button>
</header>

<!-- ── Заголовок для печати (скрыт на экране) ── -->
<div class="print-only" id="printHeader">
  <div class="print-title">Meeting Minutes</div>
  <div class="print-meta" id="printMeta"></div>
</div>

<div id="app-layout">
<aside id="sidePanel" class="side-panel">
  <div id="sidePanelContent"></div>
</aside>
<div id="appMain">

<!-- ── Tab: Протокол ── -->
<div id="tab-protocol">
  <!-- ── Фильтры · Дашборд · Действия ── -->
  <div class="adv-toolbar" id="advToolbar">
    <!-- Левая колонка: фильтры -->
    <div class="adv-filters">
      <span class="adv-label">Фильтр:</span>
      <select class="toolbar-select" id="filterDeptSel">
        <option value="">Все отделы</option>
      </select>
      <select class="toolbar-select" id="filterExecSel">
        <option value="">Все исполнители</option>
      </select>
      <select class="toolbar-select" id="filterPrioSel">
        <option value="">Все приоритеты</option>
        <option value="high">🔴 Высокий</option>
        <option value="medium">🟡 Средний</option>
        <option value="low">🔵 Низкий</option>
      </select>
      <button class="btn-reset-adv" id="btnResetAdv" style="display:none">✕ Сбросить</button>
    </div>
    <!-- Центральная колонка: дашборд -->
    <div class="dashboard" id="dashboard">
      <button class="dash-tile dash-tile--grey active" data-filter="">
        <span class="dash-num" id="dash-all">—</span>
        <span class="dash-label">Все</span>
      </button>
      <button class="dash-tile dash-tile--blue" data-filter="in_progress">
        <span class="dash-num" id="dash-inprogress">—</span>
        <span class="dash-label">В работе</span>
      </button>
      <button class="dash-tile dash-tile--yellow" data-filter="postponed">
        <span class="dash-num" id="dash-postponed">—</span>
        <span class="dash-label">Отложено</span>
      </button>
      <button class="dash-tile dash-tile--green" data-filter="closed">
        <span class="dash-num" id="dash-closed">—</span>
        <span class="dash-label">Закрыто</span>
      </button>
    </div>
    <!-- Правая колонка: действия -->
    <div class="adv-actions">
      <div class="action-menu" id="actionMenu">
        <button class="btn-secondary action-menu-toggle" id="btnActionMenu" aria-haspopup="true" aria-expanded="false">
          Действия ▾
        </button>
        <div class="action-menu-dropdown" id="actionMenuDropdown" role="menu">
          <button class="action-menu-item" id="btnExport">⬇ Экспорт CSV</button>
          <button class="action-menu-item" id="btnExportXlsx">⬇ Экспорт Excel</button>
          <button class="action-menu-item" id="btnImport">⬆ Импорт CSV</button>
          <input type="file" id="importFile" accept=".csv" style="display:none">
          <hr class="action-menu-divider">
          <button class="action-menu-item" onclick="window.print()">🖨 Печать</button>
        </div>
      </div>
      <button class="btn-primary" id="btnAdd">+ Добавить</button>
    </div>
  </div>

  <!-- Панель массовых операций -->
  <div class="bulk-bar" id="bulkBar">
    <span><span class="bulk-count" id="bulkCount">0</span> выбрано</span>
    <span class="bulk-sep">|</span>
    <span>Состояние:</span>
    <select class="bulk-state-select" id="bulkStateSelect">
      <option value="">— выбрать —</option>
      <option value="in_progress">В работе</option>
      <option value="postponed">Отложено</option>
      <option value="closed">Закрыто</option>
    </select>
    <button class="btn-bulk" id="btnBulkState">Применить</button>
    <span class="bulk-sep">|</span>
    <button class="btn-bulk danger" id="btnBulkDelete">🗑 Удалить</button>
    <button class="btn-bulk-clear" id="btnBulkClear" title="Снять выделение">✕</button>
  </div>

  <div id="paginationBar" class="pagination-bar" style="display:none">
    <span class="pagination-info" id="paginationInfo"></span>
    <div class="pagination-pages" id="paginationPages"></div>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#9ca3af">
      По
      <select class="page-size-sel" id="pageSizeSel" onchange="setPageSize(+this.value)">
        <option value="10">10</option>
        <option value="20" selected>20</option>
        <option value="50">50</option>
        <option value="0">Все</option>
      </select>
      на стр.
    </label>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="sel"><input type="checkbox" class="select-all-cb" id="selectAllCb" title="Выбрать все"></th>
          <th>#</th>
          <th title="Приоритет">●</th>
          <th class="sortable" data-col="ticket">Тикет <span class="sort-arrow"></span></th>
          <th class="sortable" data-col="topic">Тема <span class="sort-arrow"></span></th>
          <th>Статусы</th>
          <th class="sortable" data-col="state">Состояние <span class="sort-arrow"></span></th>
          <th class="sortable" data-col="due_date">Срок <span class="sort-arrow"></span></th>
          <th>Исполнитель</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- ── Tab: Справочники ── -->
<div id="tab-refs" style="display:none">

  <div class="ref-page">
    <h2>Справочники</h2>
    <div class="ref-grid">

      <!-- Отделы -->
      <div class="ref-card">
        <h3>Отделы</h3>
        <div class="ref-add-form">
          <input type="text" id="deptNameInput" placeholder="Название отдела" maxlength="100">
          <button class="btn-ref-add" id="btnDeptAdd">Добавить</button>
        </div>
        <div class="ref-list" id="deptList"></div>
      </div>

      <!-- Исполнители -->
      <div class="ref-card">
        <h3>Исполнители</h3>
        <div class="ref-add-form">
          <input type="text" id="execNameInput" placeholder="ФИО / название" maxlength="120">
          <select id="execDeptSelect">
            <option value="">Без отдела</option>
          </select>
          <button class="btn-ref-add" id="btnExecAdd">Добавить</button>
        </div>
        <input type="text" class="ref-search" id="execSearchInput" placeholder="Поиск исполнителя…">
        <div class="ref-list" id="execList"></div>
      </div>

    </div>
  </div>
</div>

</div><!-- #appMain -->
</div><!-- #app-layout -->

<!-- ── Confirm dialog ── -->
<div class="overlay" id="confirmOverlay">
  <div class="modal confirm-modal">
    <h2 id="confirmTitle">Подтверждение</h2>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="confirmCancel">Отмена</button>
      <button class="btn-danger" id="confirmOk">Удалить</button>
    </div>
  </div>
</div>

<!-- ── Toasts ── -->
<div class="toast-wrap" id="toastWrap"></div>

</body>
</html>
