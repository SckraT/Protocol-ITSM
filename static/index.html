document.getElementById('btnAdd').addEventListener('click', openAdd);
document.getElementById('btnItemCancel').addEventListener('click', closeItemModal);
itemOverlay.addEventListener('click', e => { if (e.target === itemOverlay) closeItemModal(); });

itemForm.addEventListener('submit', async e => {
  e.preventDefault();
  const id         = document.getElementById('fieldId').value;
  const statusDate = document.getElementById('fieldStatusDate').value || null;
  const statusNote = document.getElementById('fieldStatusNote').value.trim() || null;

  const payload = {
    topic:     document.getElementById('fieldTopic').value.trim(),
    ticket:    document.getElementById('fieldTicket').value.trim()  || null,
    priority:  document.getElementById('fieldPriority').value       || null,
    state:     document.getElementById('fieldState').value,
    due_date:  document.getElementById('fieldDueDate').value        || null,
    executors: getExecutorsFromForm(),
  };

  try {
    if (id) {
      await apiFetch(`${API}/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      if (statusNote) {
        await apiFetch(`${API}/${id}/statuses`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ status_date: statusDate, status_note: statusNote }) });
      }
    } else {
      await apiFetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ ...payload, status_date: statusDate, status_note: statusNote }) });
    }
    closeItemModal();
    loadAll();
    toast(id ? 'Задача обновлена' : 'Задача добавлена', 'success');
  } catch (err) {
    toast('Не удалось сохранить задачу', 'error');
  }
});

async function deleteItem(id) {
  const item = allItems.find(i => i.id === id);
  if (!await confirmDialog(`Удалить задачу?\n\n${item?.topic || ''}`)) return;

  // Оптимистичное обновление: сохраняем состояние для отката
  saveDOMState();
  const itemIndex = allItems.findIndex(i => i.id === id);
  const deletedItem = allItems[itemIndex];

  // Удаляем из DOM с анимацией
  removeRowFromTable(id);

  // Удаляем из allItems и из выделения
  allItems.splice(itemIndex, 1);
  selectedItems.delete(id);

  // Обновляем счётчики
  updateDashboardCounts();
  updateBulkBar();

  try {
    await apiFetch(`${API}/${id}`, { method: 'DELETE' });
    toast('Задача удалена', 'success');
  } catch (e) {
    // Откатываем при ошибке
    allItems.splice(itemIndex, 0, deletedItem);
    render();
    toast('Не удалось удалить задачу. Повтор…', 'error');
  }
}

// ── History modal ──────────────────────────────────────────────────────────

const historyOverlay = document.getElementById('historyOverlay');

async function openHistory(id) {
  historyItemId = id;
  document.getElementById('historyTopic').textContent = allItems.find(i => i.id === id)?.topic || '';
  document.getElementById('newStatusDate').value = today();
  document.getElementById('newStatusNote').value = '';
  await renderHistory();
  historyOverlay.classList.add('open');
}

async function renderHistory() {
  const list = document.getElementById('historyList');
  let statuses;
  try {
    const res = await apiFetch(`${API}/${historyItemId}/statuses`);
    statuses  = await res.json();
  } catch (e) {
    list.innerHTML = '<div class="history-empty">Не удалось загрузить историю</div>';
    return;
  }
  if (!statuses.length) { list.innerHTML = '<div class="history-empty">Статусов ещё нет</div>'; return; }
  list.innerHTML = statuses.map((s, idx) => `
    <div class="history-item ${idx === 0 ? 'latest' : ''}">
      <div class="history-dot"></div>
      <div class="history-body">
        <div class="history-date">${s.status_date ? fmtDate(s.status_date) : 'Дата не указана'}</div>
        ${s.status_note ? `<div class="history-note">${esc(s.status_note)}</div>` : `<div class="history-note-empty">Описание не указано</div>`}
      </div>
      <button class="history-del" onclick="deleteStatus(${s.id})">×</button>
    </div>`).join('');
}

async function deleteStatus(statusId) {
  if (!await confirmDialog('Удалить этот статус?')) return;
  try {
    await apiFetch(`/api/statuses/${statusId}`, { method: 'DELETE' });
    await renderHistory();
    toast('Статус удалён', 'success');
  } catch (e) {
    toast('Не удалось удалить статус', 'error');
  }
}

document.getElementById('btnAddStatus').addEventListener('click', async () => {
  const date = document.getElementById('newStatusDate').value || null;
  const note = document.getElementById('newStatusNote').value.trim() || null;
  if (!note) return;
  try {
    await apiFetch(`${API}/${historyItemId}/statuses`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ status_date: date, status_note: note }) });
    document.getElementById('newStatusNote').value = '';
    document.getElementById('newStatusDate').value = today();
    await renderHistory();
    toast('Статус добавлен', 'success');
  } catch (e) {
    toast('Не удалось добавить статус', 'error');
  }
});

function closeHistoryModal() { historyOverlay.classList.remove('open'); historyItemId = null; }
document.getElementById('btnHistoryClose').addEventListener('click', closeHistoryModal);
historyOverlay.addEventListener('click', e => { if (e.target === historyOverlay) closeHistoryModal(); });

// ── Справочник: Отделы ─────────────────────────────────────────────────────

function renderDeptList() {
  const list = document.getElementById('deptList');
  if (!allDepartments.length) {
    list.innerHTML = '<div class="ref-empty">Список пуст</div>';
    return;
  }
  // Считаем исполнителей по отделам
  const execPerDept = new Map();
  allExecutors.forEach(e => {
    if (e.department_id) execPerDept.set(e.department_id, (execPerDept.get(e.department_id) || 0) + 1);
  });

  list.innerHTML = allDepartments.map(d => {
    if (editingDeptId === d.id) {
      return `
        <div class="ref-item">
          <div class="ref-edit-form">
            <input type="text" id="edit-dept-name-${d.id}" value="${esc(d.name)}" maxlength="100"
                   onkeydown="refEditKeydown(event, () => saveEditDept(${d.id}), cancelEditDept)">
            <button class="btn-ref-save" onclick="saveEditDept(${d.id})">Сохранить</button>
            <button class="btn-ref-cancel" onclick="cancelEditDept()" title="Отмена">×</button>
          </div>
        </div>`;
    }
    const cnt = execPerDept.get(d.id) || 0;
    const badgeCls = cnt > 0 ? 'ref-count-badge ref-count-badge--active' : 'ref-count-badge ref-count-badge--zero';
    const badgeTxt = cnt > 0 ? `${cnt} ${plural(cnt, ['исполнитель','исполнителя','исполнителей'])}` : 'нет исполнителей';
    return `
      <div class="ref-item">
        <span class="ref-name">${esc(d.name)}</span>
        <span class="${badgeCls}">${badgeTxt}</span>
        <button class="ref-edit" onclick="startEditDept(${d.id})" title="Редактировать">✏️</button>
        <button class="ref-del" onclick="deleteDept(${d.id})" title="Удалить">×</button>
      </div>`;
  }).join('');

  if (editingDeptId != null) {
    const inp = document.getElementById(`edit-dept-name-${editingDeptId}`);
    if (inp) { inp.focus(); inp.select(); }
  }
}

function startEditDept(id) { editingExecId = null; editingDeptId = id; renderDeptList(); renderExecList(); }
function cancelEditDept()   { editingDeptId = null; renderDeptList(); }

async function saveEditDept(id) {
  const name = document.getElementById(`edit-dept-name-${id}`)?.value.trim();
  if (!name) return;
  try {
    const res = await apiFetch(`/api/departments/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name }) }, [409]);
    if (res.status === 409) { toast('Такой отдел уже существует', 'error'); return; }
    editingDeptId = null;
    await loadRefs();
    toast('Отдел обновлён', 'success');
  } catch (e) {
    toast('Не удалось сохранить отдел', 'error');
  }
}

async function addDept() {
  const input = document.getElementById('deptNameInput');
  const name  = input.value.trim();
  if (!name) return;
  try {
    const res = await apiFetch('/api/departments', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name }) }, [409]);
    if (res.status === 409) { toast('Такой отдел уже существует', 'error'); return; }
    input.value = '';
    await loadRefs();
    toast('Отдел добавлен', 'success');
  } catch (e) {
    toast('Не удалось добавить отдел', 'error');
  }
}

async function deleteDept(id) {
  const dept = allDepartments.find(d => d.id === id);
  if (!await confirmDialog(`Удалить отдел «${dept?.name}»?\n\nИсполнители этого отдела останутся, но потеряют привязку к отделу.`)) return;
  try {
    await apiFetch(`/api/departments/${id}`, { method: 'DELETE' });
    await loadRefs();
    toast('Отдел удалён', 'success');
  } catch (e) {
    toast('Не удалось удалить отдел', 'error');
  }
}

document.getElementById('btnDeptAdd').addEventListener('click', addDept);
document.getElementById('deptNameInput').addEventListener('keydown', e => { if (e.key === 'Enter') addDept(); });

// ── Справочник: Исполнители ────────────────────────────────────────────────

function renderExecList() {
  const list = document.getElementById('execList');

  // Фильтр по строке поиска
  const q = execSearchQuery.toLowerCase();
  const visible = q
    ? allExecutors.filter(e =>
        e.name.toLowerCase().includes(q) ||
        (e.department_name || '').toLowerCase().includes(q))
    : allExecutors;

  if (!visible.length) {
    list.innerHTML = `<div class="ref-empty">${q ? 'Не найдено' : 'Список пуст'}</div>`;
    return;
  }

  // Счётчик задач на исполнителя
  const taskCount = new Map();
  allItems.forEach(item =>
    (item.executors || []).forEach(e => {
      if (e.id) taskCount.set(e.id, (taskCount.get(e.id) || 0) + 1);
    })
  );

  // Функция рендера одной строки
  const renderExec = e => {
    if (editingExecId === e.id) {
      const opts = ['<option value="">Без отдела</option>'].concat(
        allDepartments.map(d => `<option value="${d.id}" ${d.id === e.department_id ? 'selected' : ''}>${esc(d.name)}</option>`)
      ).join('');
      return `
        <div class="ref-item">
          <div class="ref-edit-form">
            <input type="text" id="edit-exec-name-${e.id}" value="${esc(e.name)}" maxlength="120"
                   onkeydown="refEditKeydown(event, () => saveEditExec(${e.id}), cancelEditExec)">
            <select id="edit-exec-dept-${e.id}">${opts}</select>
            <button class="btn-ref-save" onclick="saveEditExec(${e.id})">Сохранить</button>
            <button class="btn-ref-cancel" onclick="cancelEditExec()" title="Отмена">×</button>
          </div>
        </div>`;
    }
    const cnt = taskCount.get(e.id) || 0;
    const badgeCls = cnt > 0 ? 'ref-count-badge ref-count-badge--active' : 'ref-count-badge ref-count-badge--zero';
    const badgeTxt = cnt > 0 ? `${cnt} ${plural(cnt, ['задача','задачи','задач'])}` : 'нет задач';
    return `
      <div class="ref-item">
        <span class="ref-name">${esc(e.name)}</span>
        <span class="${badgeCls}">${badgeTxt}</span>
        <button class="ref-edit" onclick="startEditExec(${e.id})" title="Редактировать">✏️</button>
        <button class="ref-del" onclick="deleteExecutor(${e.id})" title="Удалить">×</button>
      </div>`;
  };

  // Группировка по отделу
  const byDept = new Map();
  const noDept = [];
  visible.forEach(e => {
    if (e.department_name) {
      if (!byDept.has(e.department_name)) byDept.set(e.department_name, []);
      byDept.get(e.department_name).push(e);
    } else {
      noDept.push(e);
    }
  });

  let html = '';
  [...byDept.keys()].sort((a, b) => a.localeCompare(b, 'ru')).forEach(dept => {
    html += `<div class="ref-dept-header">${esc(dept)}</div>`;
    html += byDept.get(dept).map(renderExec).join('');
  });
  if (noDept.length) {
    if (byDept.size) html += `<div class="ref-dept-header">Без отдела</div>`;
    html += noDept.map(renderExec).join('');
  }
  list.innerHTML = html;

  if (editingExecId != null) {
    const inp = document.getElementById(`edit-exec-name-${editingExecId}`);
    if (inp) { inp.focus(); inp.select(); }
  }
}

/** Enter — сохранить, Escape — отменить (для инлайн-полей справочника). */
function refEditKeydown(e, onSave, onCancel) {
  if (e.key === 'Enter')  { e.preventDefault(); onSave(); }
  if (e.key === 'Escape') { e.preventDefault(); onCancel(); }
}

function startEditExec(id) { editingDeptId = null; editingExecId = id; renderExecList(); renderDeptList(); }
function cancelEditExec()   { editingExecId = null; renderExecList(); }

async function saveEditExec(id) {
  const name = document.getElementById(`edit-exec-name-${id}`)?.value.trim();
  if (!name) return;
  const deptVal = document.getElementById(`edit-exec-dept-${id}`)?.value;
  const deptId  = deptVal ? parseInt(deptVal) : null;
  try {
    const res = await apiFetch(`/api/executors/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name, department_id: deptId }) }, [409]);
    if (res.status === 409) { toast('Такой исполнитель уже есть в списке', 'error'); return; }
    editingExecId = null;
    await loadRefs();
    toast('Исполнитель обновлён', 'success');
  } catch (e) {
    toast('Не удалось сохранить исполнителя', 'error');
  }
}

/** Обновляет <select> выбора отдела в форме добавления исполнителя. */
function renderExecDeptSelect() {
  const sel = document.getElementById('execDeptSelect');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Без отдела</option>';
  allDepartments.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id;
    opt.textContent = d.name;
    sel.appendChild(opt);
  });
  sel.value = cur;
}

async function addExecutorRef() {
  const nameInput = document.getElementById('execNameInput');
  const deptSel   = document.getElementById('execDeptSelect');
  const name      = nameInput.value.trim();
  if (!name) return;
  const deptId = deptSel.value ? parseInt(deptSel.value) : null;
  try {
    const res = await apiFetch('/api/executors', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name, department_id: deptId }) }, [409]);
    if (res.status === 409) { toast('Такой исполнитель уже есть в списке', 'error'); return; }
    nameInput.value = '';
    await loadRefs();
    toast('Исполнитель добавлен', 'success');
  } catch (e) {
    toast('Не удалось добавить исполнителя', 'error');
  }
}

async function deleteExecutor(id) {
  const exec = allExecutors.find(e => e.id === id);
  if (!await confirmDialog(`Удалить «${exec?.name}» из справочника?\n\nЗадачи с этим исполнителем затронуты не будут.`)) return;
  try {
    await apiFetch(`/api/executors/${id}`, { method: 'DELETE' });
    await loadRefs();
    toast('Исполнитель удалён', 'success');
  } catch (e) {
    toast('Не удалось удалить исполнителя', 'error');
  }
}

document.getElementById('btnExecAdd').addEventListener('click', addExecutorRef);
document.getElementById('execNameInput').addEventListener('keydown', e => { if (e.key === 'Enter') addExecutorRef(); });
document.getElementById('execSearchInput').addEventListener('input', e => {
  execSearchQuery = e.target.value.toLowerCase().trim();
  renderExecList();
});

// ── Экспорт / Импорт ──────────────────────────────────────────────────────

document.getElementById('btnExport').addEventListener('click', () => { window.location = '/api/export/csv'; });
document.getElementById('btnImport').addEventListener('click', () => { document.getElementById('importFile').click(); });
document.getElementById('importFile').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res  = await apiFetch('/api/import/csv', { method: 'POST', body: fd });
    const data = await res.json();
    e.target.value = '';
    loadAll();
    toast(`Импортировано задач: ${data.imported}`, 'success');
  } catch (err) {
    e.target.value = '';
    toast('Не удалось импортировать файл', 'error');
  }
});

// ── Глобальные клавиши ───────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  // Escape закрывает открытую модалку (сверху вниз по приоритету), затем снимает выделение.
  if (e.key === 'Escape') {
    if (confirmOverlay.classList.contains('open')) { closeConfirm(false);   return; }
    if (historyOverlay.classList.contains('open')) { closeHistoryModal();   return; }
    if (itemOverlay.classList.contains('open'))    { closeItemModal();      return; }
    if (selectedItems.size)                        { clearSelection();      return; }
  }
  // Enter / Space активируют элементы с role="button" (бейдж состояния, ссылка истории).
  if ((e.key === 'Enter' || e.key === ' ') && e.target.matches?.('[role="button"]')) {
    e.preventDefault();
    e.target.click();
  }
});

// ── Печать ─────────────────────────────────────────────────────────────────

window.addEventListener('beforeprint', () => {
  const filterLabels = { in_progress: 'В работе', postponed: 'Отложено', closed: 'Закрыто' };
  const filterLabel  = currentFilter ? (filterLabels[currentFilter] || currentFilter) : 'Все задачи';
  const now = new Date().toLocaleDateString('ru', { day: '2-digit', month: 'long', year: 'numeric' });
  document.getElementById('printMeta').textContent = `${filterLabel} · ${now}`;
});

// ── Старт ──────────────────────────────────────────────────────────────────

loadViewState();
loadAll();
</script>
