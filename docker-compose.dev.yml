# Dev-режим: бэкенд и фронтенд запускаются раздельно с hot-reload
# Бэкенд: http://localhost:8000  (API + Swagger)
# Фронтенд: http://localhost:5173 (Svelte dev server с HMR)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: protocol
      POSTGRES_USER: protocol
      POSTGRES_PASSWORD: protocol
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protocol"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend   # hot-reload при изменении Python-файлов
    environment:
      - DATABASE_URL=postgresql+asyncpg://protocol:protocol@postgres:5432/protocol
      - DEBUG=true
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:8000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules         # исключаем node_modules из volume
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api

volumes:
  postgres-dev-data:
