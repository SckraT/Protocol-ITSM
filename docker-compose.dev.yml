# Dev-режим: бэкенд и фронтенд запускаются раздельно с hot-reload
# Бэкенд: http://localhost:8000  (API + Swagger)
# Фронтенд: http://localhost:5173 (Svelte dev server с HMR)
# Prefect UI: http://localhost:4200
# Имя compose-проекта зафиксировано — volume protocol_postgres-dev-data не зависит от имени папки.
name: protocol

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: protocol
      POSTGRES_USER: protocol
      POSTGRES_PASSWORD: protocol
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protocol"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prefect: оркестрация flow (только в dev — для удобства отладки) ─────
  prefect-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prefect
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
    volumes:
      - prefect-dev-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 10s
      timeout: 5s
      retries: 5

  prefect-server:
    image: prefecthq/prefect:3-python3.12
    command: >
      sh -c "prefect server database upgrade &&
             prefect server start --host 0.0.0.0 --port 4200"
    ports:
      - "4200:4200"
    environment:
      - PREFECT_HOME=/opt/prefect
      - PREFECT_SERVER_API_AUTH_STRING=
      - PREFECT_SERVER_DATABASE_CONNECTION_URL=postgresql+asyncpg://prefect:prefect@prefect-db:5432/prefect
    volumes:
      - prefect-dev-home:/opt/prefect
    depends_on:
      prefect-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:4200/api/health'); sys.exit(0 if r.status==200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  prefect-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["prefect", "worker", "start", "--pool", "default"]
    volumes:
      - ./backend:/app/backend   # hot-reload при изменении Python-файлов
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - PREFECT_API_AUTH_STRING=
      - PREFECT_HOME=/opt/prefect
      - DATABASE_URL=postgresql+asyncpg://protocol:protocol@postgres:5432/protocol
      - DEBUG=true
    depends_on:
      prefect-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend   # hot-reload при изменении Python-файлов
    environment:
      - DATABASE_URL=postgresql+asyncpg://protocol:protocol@postgres:5432/protocol
      - DEBUG=true
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:8000
      - PREFECT_API_URL=http://prefect-server:4200/api
    depends_on:
      postgres:
        condition: service_healthy
      prefect-server:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules         # исключаем node_modules из volume
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api

volumes:
  postgres-dev-data:
  prefect-dev-db-data:
  prefect-dev-home:
