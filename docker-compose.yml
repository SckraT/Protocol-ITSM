# Продакшн: один контейнер, фронтенд встроен в статику
services:
  protocol:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/protocol.db
      # JWT-безопасность: обязательно задать SECRET_KEY в production!
      - SECRET_KEY=change-me-in-production-use-strong-random-key
      - FIRST_ADMIN_USERNAME=admin
      - FIRST_ADMIN_PASSWORD=admin
    restart: unless-stopped
    healthcheck:
      # python:3.12-slim не содержит curl — проверяем через urllib
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
