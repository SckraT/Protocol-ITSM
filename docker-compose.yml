# Продакшн: один контейнер, фронтенд встроен в статику
services:
  protocol:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/protocol.db
    # Секреты (SECRET_KEY, FIRST_ADMIN_*) — в .env (не коммитится, см. .env.example).
    # required: false — без .env поднимется на дефолтах из config.py (для локальной разработки).
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    healthcheck:
      # python:3.12-slim не содержит curl — проверяем через urllib
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
