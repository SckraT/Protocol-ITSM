# Dev/prod: бэкенд + PostgreSQL. Фронтенд встроен в статику.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: protocol
      POSTGRES_USER: protocol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-protocol}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protocol"]
      interval: 10s
      timeout: 5s
      retries: 5

  protocol:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://protocol:${POSTGRES_PASSWORD:-protocol}@postgres:5432/protocol
    # Секреты (SECRET_KEY, FIRST_ADMIN_*, POSTGRES_PASSWORD) — в .env (не коммитится, см. .env.example).
    # required: false — без .env поднимется на дефолтах из config.py (для локальной разработки).
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # python:3.12-slim не содержит curl — проверяем через urllib
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres-data:
