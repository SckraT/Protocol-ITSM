# Dev/prod: бэкенд + PostgreSQL + Redis + Prefect (server, worker, БД).
# Фронтенд встроен в статику.
# Имя compose-проекта зафиксировано — volume protocol_postgres-data не зависит от имени папки.
name: protocol

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: protocol
      POSTGRES_USER: protocol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-protocol}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protocol"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Prefect: оркестрация flow (SLA-эскалация, согласование Change) ───────
  # Изолированная БД Prefect — отдельная от нашей схемы protocol.
  prefect-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prefect
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
    volumes:
      - prefect-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 10s
      timeout: 5s
      retries: 5

  prefect-server:
    image: prefecthq/prefect:3-python3.12
    # Prefect при старте: поднимает схему (prefect database upgrade) и API на :4200.
    command: >
      sh -c "prefect server database upgrade &&
             prefect server start --host 0.0.0.0 --port 4200"
    ports:
      - "4200:4200"
    environment:
      - PREFECT_HOME=/opt/prefect
      - PREFECT_SERVER_API_AUTH_STRING=${PREFECT_SERVER_API_AUTH_STRING:-}
      - PREFECT_SERVER_DATABASE_CONNECTION_URL=postgresql+asyncpg://prefect:prefect@prefect-db:5432/prefect
    volumes:
      - prefect-home:/opt/prefect
    restart: unless-stopped
    depends_on:
      prefect-db:
        condition: service_healthy
    healthcheck:
      # prefecthq/prefect:3 имеет python и urllib — пингуем /api/health.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:4200/api/health'); sys.exit(0 if r.status==200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  prefect-worker:
    # Worker запускает flow, зарегистрированные в work pool `default` (PREFECT_WORK_POOL).
    # Использует тот же backend-образ (build из Dockerfile) — общие зависимости и код.
    build:
      context: .
      dockerfile: Dockerfile
    command: ["prefect", "worker", "start", "--pool", "default"]
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - PREFECT_API_AUTH_STRING=${PREFECT_SERVER_API_AUTH_STRING:-}
      - PREFECT_HOME=/opt/prefect
      - DATABASE_URL=postgresql+asyncpg://protocol:${POSTGRES_PASSWORD:-protocol}@postgres:5432/protocol
    restart: unless-stopped
    depends_on:
      prefect-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  protocol:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://protocol:${POSTGRES_PASSWORD:-protocol}@postgres:5432/protocol
      - REDIS_URL=redis://redis:6379/0
      - PREFECT_API_URL=http://prefect-server:4200/api
      - PREFECT_API_AUTH_STRING=${PREFECT_SERVER_API_AUTH_STRING:-}
    # Секреты (SECRET_KEY, FIRST_ADMIN_*, POSTGRES_PASSWORD, PREFECT_SERVER_API_AUTH_STRING)
    # — в .env (не коммитится, см. .env.example).
    # required: false — без .env поднимется на дефолтах из config.py (для локальной разработки).
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      prefect-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # python:3.12-slim не содержит curl — проверяем через urllib
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres-data:
  prefect-db-data:
  prefect-home:
