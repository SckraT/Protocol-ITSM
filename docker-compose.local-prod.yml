# Продакшн-стек для локального ПК с HTTPS через mkcert.
# Порт 8000 НЕ публикуется наружу — только внутри Docker-сети.
# Весь трафик: браузер → Nginx (443/80) → protocol:8000 (внутри сети).
#
# Предварительно (один раз):
#   winget install FiloSottile.mkcert
#   mkcert -install
#   mkcert -cert-file deploy/certs/localhost.pem -key-file deploy/certs/localhost-key.pem localhost 127.0.0.1 ::1
#
# Запуск:
#   docker compose -f docker-compose.local-prod.yml up -d --build
#   # Приложение: https://localhost
#   # Swagger UI: https://localhost/api/docs
#
# Остановка (данные в volume сохраняются):
#   docker compose -f docker-compose.local-prod.yml down
#
# Просмотр логов:
#   docker compose -f docker-compose.local-prod.yml logs -f

# Имя compose-проекта зафиксировано — volume protocol_postgres-data не зависит от имени папки.
name: protocol

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: protocol
      POSTGRES_USER: protocol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protocol"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  protocol:
    build:
      context: .
      dockerfile: Dockerfile
    # Порт НЕ публикуется на хост — доступен только внутри Docker-сети (через nginx)
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://protocol:${POSTGRES_PASSWORD}@postgres:5432/protocol
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD", "python", "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
      # Сертификат mkcert (не коммитится в git, генерируется локально — см. выше)
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      protocol:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
