# CI для «Протокол совещаний».
# Запускается на push/PR в beta и main. Покрывает линт, тесты,
# проверку фронтенда и сборку Docker.
name: CI

on:
  push:
    branches: [beta, main]
  pull_request:
    branches: [beta, main]

# Отменять запуски для того же PR/ветки при новых коммитах
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Линт: ruff на бэкенде (фронтенд проверяется svelte-check в check-frontend) ──
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Ruff (backend)
        working-directory: backend
        run: ruff check app/

  # ── Backend: pytest с покрытием ────────────────────────────────────────────
  # Тесты используют in-memory SQLite (aiosqlite) — см. tests/conftest.py.
  # Production-стек (asyncpg) проверяется отдельным docker-build джобом.
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run pytest
        working-directory: backend
        run: pytest -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: backend/.coverage
          retention-days: 14

  # ── Frontend: svelte-check + tsc ──────────────────────────────────────────
  check-frontend:
    name: Frontend type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: svelte-check
        working-directory: frontend
        run: npm run check

  # ── Docker: проверка production-сборки (только PR/push в main) ────────────
  docker-build:
    name: Docker build (prod)
    runs-on: ubuntu-latest
    needs: [lint, test-backend, check-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        run: docker build -t protocol:ci-${{ github.sha }} .
