# Nginx reverse-proxy для локального/PC продакшн-деплоя с HTTPS.
# Сертификат сгенерирован mkcert (доверенный на этой машине без предупреждений браузера).
# Используется в docker-compose.local-prod.yml.

# Редирект HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name localhost _;

    return 301 https://$host$request_uri;
}

# HTTPS: TLS + proxy к backend
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name localhost _;

    ssl_certificate     /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

    # Только TLS 1.2/1.3; сессионный кэш для производительности
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # HSTS — браузер запомнит HTTPS на 180 дней
    add_header Strict-Transport-Security "max-age=15552000" always;

    # Запас для импорта CSV / выгрузок Excel
    client_max_body_size 20M;

    # Логи в stdout/stderr — читаются через `docker compose logs nginx`
    access_log  /dev/stdout;
    error_log   /dev/stderr warn;

    location / {
        # В Docker-сети backend резолвится по имени сервиса "protocol"
        proxy_pass http://protocol:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты для импорта/экспорта CSV/Excel
        proxy_connect_timeout  30s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }
}
