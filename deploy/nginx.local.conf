# Nginx reverse-proxy для локального/PC продакшн-деплоя.
# Используется в docker-compose.local-prod.yml вместо хостового Nginx.
# Nginx и backend живут в одной Docker-сети; backend недоступен снаружи напрямую.

server {
    listen 80;
    listen [::]:80;
    server_name localhost _;

    # Запас для импорта CSV / выгрузок Excel
    client_max_body_size 20M;

    # Логи в stdout/stderr — читаются через `docker compose logs nginx`
    access_log  /dev/stdout;
    error_log   /dev/stderr warn;

    location / {
        # В Docker-сети backend резолвится по имени сервиса "protocol"
        proxy_pass http://protocol:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты для импорта/экспорта CSV/Excel
        proxy_connect_timeout  30s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }
}
