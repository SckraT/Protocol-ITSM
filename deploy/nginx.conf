# Nginx reverse-proxy для «Протокол совещаний».
# Контейнер слушает 127.0.0.1:8000 (см. docker-compose.yml), наружу — только через Nginx.
#
# Установка:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/protocol
#   # замените protocol.example.com на свой домен
#   sudo ln -s /etc/nginx/sites-available/protocol /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS добавит Certbot (он сам перепишет этот server-блок на 443 + редирект с 80):
#   sudo certbot --nginx -d protocol.example.com --redirect

server {
    listen 80;
    listen [::]:80;
    server_name protocol.example.com;

    # Запас для импорта CSV / выгрузок
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты на длинные операции (экспорт Excel и т.п.)
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
    }
}
